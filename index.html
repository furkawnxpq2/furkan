<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasan Furkan | 3D & Space Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: #050505; color: #ffffff; font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* Arka Plan */
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); z-index: -1; }

        /* ANA EKRAN */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 8px; margin-bottom: 30px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px 40px; text-decoration: none; font-weight: 700; border-radius: 50px; transition: 0.4s; display: inline-flex; align-items: center; gap: 10px; font-size: 1rem; }
        .wp-btn { border: 2px solid #25D366; color: #25D366; }
        .wp-btn:hover { background: #25D366; color: #000; box-shadow: 0 0 30px rgba(37,211,102,0.4); }
        .game-btn { border: 2px solid #00d2ff; color: #00d2ff; }
        .game-btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 30px rgba(0,210,255,0.4); }

        /* ALT NAV (Shopier & Insta) */
        .bottom-nav { position: absolute; bottom: 80px; width: 90%; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { text-decoration: none; color: white; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-link:hover { color: #00d2ff; }
        .nav-link.insta:hover { color: #E1306C; }

        /* OYUN ALANI */
        .game-section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); }
        #gameCanvas { background: #000; border: 2px solid #333; cursor: none; max-width: 95vw; }
        
        footer { width: 100%; padding: 20px; text-align: center; font-size: 0.7rem; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>

    <section class="hero">
        <h1 class="main-title">HASAN FURKAN</h1>
        <div class="btn-group">
            <a href="https://wa.me/905376404207" class="btn wp-btn"><i class="fab fa-whatsapp"></i> İLETİŞİME GEÇ</a>
            <a href="#game" class="btn game-btn"><i class="fas fa-rocket"></i> OYUN ARASI</a>
        </div>

        <div class="bottom-nav">
            <a href="https://www.shopier.com/KULLANICI_ADIN" class="nav-link" target="_blank">
                <i class="fas fa-shopping-cart" style="font-size: 2rem;"></i>
                <span style="font-family: 'Orbitron'; font-size: 0.7rem;">SHOPIER</span>
            </a>
            <a href="https://www.instagram.com/furkan202207/" class="nav-link insta" target="_blank">
                <span style="font-family: 'Orbitron'; font-size: 0.7rem;">@furkan202207</span>
                <i class="fab fa-instagram" style="font-size: 2rem;"></i>
            </a>
        </div>
    </section>

    <section id="game" class="game-section">
        <h2 style="font-family: 'Orbitron'; color: #00d2ff; margin-bottom: 10px;">SPACE DODGE</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Meteorlardan kaçmak için fareyi kaydır!</p>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
    </section>

    <footer>© 2026 HASAN FURKAN | TÜM HAKLARI SAKLIDIR</footer>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let gameActive = true;

        const player = { x: 200, y: 450, w: 30, h: 30, color: "#00d2ff" };
        const enemies = [];
        let enemyFreq = 0.02;

        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.w / 2;
        });

        function spawnEnemy() {
            if (Math.random() < enemyFreq) {
                enemies.push({ x: Math.random() * (canvas.width - 20), y: -20, w: 20, h: 20, speed: 3 + score/100 });
            }
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Oyuncu Çizimi
            ctx.shadowBlur = 15; ctx.shadowColor = "#00d2ff";
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;

            // Meteorlar
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                ctx.fillStyle = "#ff4d4d";
                ctx.fillRect(enemies[i].x, enemies[i].y, enemies[i].w, enemies[i].h);

                // Çarpışma Kontrolü
                if (enemies[i].x < player.x + player.w && enemies[i].x + enemies[i].w > player.x &&
                    enemies[i].y < player.y + player.h && enemies[i].y + enemies[i].h > player.y) {
                    gameActive = false;
                    alert("Meteor Çarptı! Skorun: " + Math.floor(score));
                    location.reload();
                }

                if (enemies[i].y > canvas.height) { enemies.splice(i, 1); score += 10; enemyFreq += 0.0001; }
            }
            
            ctx.fillStyle = "white";
            ctx.fillText("SKOR: " + Math.floor(score), 10, 20);
            spawnEnemy();
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
