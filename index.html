    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

       

        body {

            background-color: #050505;

            color: #ffffff;

            font-family: 'Poppins', sans-serif;

            height: 100vh;

            display: flex;

            flex-direction: column; /* İçeriği dikey sıralamak için */

            justify-content: space-between;

            align-items: center;

            overflow: hidden;

            position: relative;

        }



        /* Arka Plan Efekti */

        body::after {

            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);

            z-index: -1;

        }



        /* SOL ÜST: Mağaza Yazıları */

        .top-left {

            position: absolute; top: 50px; left: 5%;

            border-left: 3px solid #00d2ff; padding-left: 15px;

        }

        .top-left h2 { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: #00d2ff; }

        .top-left p { font-size: 0.8rem; color: #777; text-transform: uppercase; margin-top: 5px; }



        /* ORTA: Ana İçerik */

        .main-content { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }

        .main-content h1 { font-family: 'Orbitron', sans-serif; font-size: 4rem; margin-bottom: 40px; letter-spacing: 8px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.1); }

       

        .wp-btn {

            display: inline-flex; align-items: center; gap: 15px;

            padding: 20px 50px; background: transparent; border: 2px solid #25D366;

            color: #25D366; text-decoration: none; font-weight: 700; border-radius: 50px;

            font-size: 1.2rem; transition: 0.4s;

        }

        .wp-btn:hover { background: #25D366; color: #000; box-shadow: 0 0 40px rgba(37, 211, 102, 0.4); transform: scale(1.1); }



        /* SAĞ ALT: Instagram + Kullanıcı Adı */

        .insta-container {

            position: absolute; bottom: 80px; right: 5%;

            display: flex; align-items: center; gap: 15px;

            text-decoration: none; color: white;

            transition: 0.4s;

        }

        .insta-container:hover { color: #E1306C; transform: translateY(-3px); }

        .insta-container span { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; letter-spacing: 1px; }

        .insta-container i { font-size: 3rem; }



        /* RESMİ ALT BİLGİ (FOOTER) */

        footer {

            width: 100%;

            padding: 20px;

            background: rgba(255, 255, 255, 0.02);

            border-top: 1px solid rgba(255, 255, 255, 0.05);

            text-align: center;

            font-size: 0.7rem;

            color: #444;

            letter-spacing: 1px;

            z-index: 10;

        }

    </style>

</head>
